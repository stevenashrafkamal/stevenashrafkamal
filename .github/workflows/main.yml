name: Generate Snake

on:
  # بيشغل الأكشن ده تلقائياً كل 24 ساعة
  schedule:
    - cron: "0 0 * * *"
  # بيسمحلك تشغله يدوياً في أي وقت
  workflow_dispatch:
  # بيشتغل لما تعمل Push على برانش main
  push:
    branches:
    - main

jobs:
  generate:
    permissions:
        contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # بيعمل generates للعبة الثعبان من مربعات مساهماتك
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: stevenashrafkamal
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # بيرفع ملفات الـ SVG اللي اتعملت لبرانش الـ output عشان نقدر نستخدمها
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
